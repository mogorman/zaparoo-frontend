[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "armv7-unknown-linux-gnueabihf" },
]

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"
ignore  = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "Zlib",
    "Unicode-3.0",
    "LicenseRef-PolyForm-Noncommercial-1.0.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions    = "deny"
wildcards            = "deny"
allow-wildcard-paths = true  # Workspace path deps have no version pin; this is fine.

# Known transitive duplicates we can't resolve without forking upstream.
# Audit this list whenever cxx-qt, tungstenite, or tracing-appender are bumped.
skip = [
    # cxx-qt-build pulls codespan-reporting 0.11 directly; its cxx-gen dep pulls 0.13.
    { crate = "codespan-reporting" },
    # codespan-reporting 0.11 → unicode-width 0.1; codespan-reporting 0.13 → 0.2.
    { crate = "unicode-width" },
    # tungstenite/rand hold getrandom 0.2; tempfile+uuid moved to 0.4.
    { crate = "getrandom" },
    # tracing-appender is on thiserror 2; cxx-qt + tungstenite still on 1.
    { crate = "thiserror" },
    { crate = "thiserror-impl" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
