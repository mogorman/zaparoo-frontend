name: Build ARM32 toolchain image

on:
  # No `push` trigger: CI's ensure-toolchain job invokes this workflow via
  # workflow_call on every push to main, and its "check if version exists"
  # gate skips the expensive build when toolchain/VERSION is unchanged. A
  # push trigger would just race the workflow_call caller for the same
  # registry tag.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 6.7.2-1)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Optional override; defaults to toolchain/VERSION contents'
        required: false
        type: string
    outputs:
      version:
        description: 'The toolchain image version that was built or verified'
        value: ${{ jobs.build.outputs.version }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Prefer this workflow's own input (unified across workflow_dispatch
          # and workflow_call via the `inputs` context); fall back to the
          # file pinned in the repo.
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ -f toolchain/VERSION ]; then
            VERSION=$(tr -d '[:space:]' < toolchain/VERSION)
          else
            echo "Error: no inputs.version provided and toolchain/VERSION is missing" >&2
            exit 1
          fi
          # Docker tag grammar: first char [A-Za-z0-9_], then up to 127 of
          # [A-Za-z0-9_.-]. Validating here surfaces a typo with a clear
          # message instead of deep inside docker manifest inspect / push.
          if ! printf '%s' "${VERSION}" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
            echo "Error: version '${VERSION}' is not a valid Docker tag" >&2
            echo "       (must match [A-Za-z0-9_][A-Za-z0-9_.-]{0,127})" >&2
            exit 1
          fi
          printf 'version=%s\n' "${VERSION}" >> "$GITHUB_OUTPUT"
          printf 'Building toolchain version: %s\n' "${VERSION}"

      - name: Set lowercase repository owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version exists
        id: check
        run: |
          if docker manifest inspect ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister:${{ steps.version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already exists in registry"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} will be built"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # Only move :latest on main — workflow_dispatch runs on arbitrary
      # branches could otherwise point :latest at an older/test toolchain.
      - name: Compute tags
        id: tags
        env:
          IMAGE: ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:${VERSION}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "${IMAGE}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.toolchain
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=toolchain
          cache-to: type=gha,mode=max,scope=toolchain
