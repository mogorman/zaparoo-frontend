name: Build ARM32 toolchain image

on:
  push:
    paths:
      - 'Dockerfile.toolchain'
      - 'toolchain/VERSION'
      - 'scripts/build-toolchain.sh'
      - '.github/workflows/toolchain-build.yml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 6.7.2-1)'
        required: true
        type: string
  workflow_call:
    outputs:
      version:
        description: 'The toolchain image version that was built or verified'
        value: ${{ jobs.build.outputs.version }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(cat toolchain/VERSION)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building toolchain version: $VERSION"

      - name: Set lowercase repository owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version exists
        id: check
        run: |
          if docker manifest inspect ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister:${{ steps.version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already exists in registry"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} will be built"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.toolchain
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister:${{ steps.version.outputs.version }}
            ghcr.io/${{ env.OWNER_LC }}/qt6-arm32-mister:latest
          cache-from: type=gha,scope=toolchain
          cache-to: type=gha,mode=max,scope=toolchain
